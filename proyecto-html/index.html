<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 420px; width: 100%;">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-primary bg-gradient text-white d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px;">
            <i class="bi bi-shop fs-2"></i>
          </div>
          <h3 class="fw-bold">Bienvenido</h3>
          <p class="text-muted small">Inicia sesión para continuar</p>
        </div>
        <form>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Correo electrónico</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" placeholder="correo@ejemplo.com">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" placeholder="••••••••">
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label small" for="remember">Recordarme</label>
            </div>
            <a href="#" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
          </button>
        </form>
        <div class="text-center mt-4">
          <p class="small text-muted">¿No tienes cuenta? <a href="registro.html" class="text-decoration-none fw-semibold">Regístrate</a></p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
