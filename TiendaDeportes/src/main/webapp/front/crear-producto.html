<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-shop me-2"></i>MiTienda</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="productos.html"><i class="bi bi-box me-1"></i>Productos</a></li>
          <li class="nav-item"><a class="nav-link active" href="crear-producto.html"><i class="bi bi-plus-circle me-1"></i>Crear</a></li>
          <li class="nav-item"><a class="nav-link" href="stock.html"><i class="bi bi-clipboard-data me-1"></i>Stock</a></li>
          <li class="nav-item"><a class="nav-link" href="estadisticas.html"><i class="bi bi-graph-up me-1"></i>Estadísticas</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="carrito.html" class="btn btn-outline-light position-relative">
            <i class="bi bi-cart3"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">3</span>
          </a>
          <div class="dropdown">
            <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle me-1"></i>Admin
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Perfil</a></li>
              <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Configuración</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="index.html"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-header bg-white border-0 pt-4 px-4">
            <h5 class="fw-bold mb-1"><i class="bi bi-plus-circle text-primary me-2"></i>Crear Nuevo Producto</h5>
            <p class="text-muted small mb-0">Completa los datos del producto</p>
          </div>
          <div class="card-body p-4">
            <form>
              <div class="row">
                <div class="col-md-8 mb-3">
                  <label class="form-label fw-semibold small">Nombre del producto</label>
                  <input type="text" class="form-control" placeholder="Ej: Laptop Pro 15">
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold small">Categoría</label>
                  <select class="form-select">
                    <option value="">Seleccionar...</option>
                    <option>Electrónica</option>
                    <option>Ropa</option>
                    <option>Hogar</option>
                    <option>Deportes</option>
                    <option>Juguetes</option>
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold small">Descripción</label>
                <textarea class="form-control" rows="3" placeholder="Descripción detallada del producto"></textarea>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold small">Precio ($)</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light">$</span>
                    <input type="number" class="form-control" placeholder="0">
                  </div>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold small">Stock inicial</label>
                  <input type="number" class="form-control" placeholder="0">
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label fw-semibold small">Código SKU</label>
                  <input type="text" class="form-control" placeholder="SKU-001">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold small">Imagen del producto</label>
                <div class="border border-dashed rounded-3 p-4 text-center bg-light">
                  <i class="bi bi-cloud-upload text-secondary" style="font-size: 2rem;"></i>
                  <p class="small text-muted mt-2 mb-0">Arrastra una imagen aquí o <a href="#" class="text-decoration-none">selecciona un archivo</a></p>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold small">Proveedor</label>
                  <input type="text" class="form-control" placeholder="Nombre del proveedor">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-semibold small">Estado</label>
                  <select class="form-select">
                    <option>Activo</option>
                    <option>Inactivo</option>
                  </select>
                </div>
              </div>
              <hr class="my-4">
              <div class="d-flex gap-2 justify-content-end">
                <button type="reset" class="btn btn-outline-secondary rounded-3 px-4"><i class="bi bi-x-circle me-1"></i>Cancelar</button>
                <button type="submit" class="btn btn-primary rounded-3 px-4"><i class="bi bi-floppy me-1"></i>Guardar Producto</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/scripts.js"></script>
</body>
</html>
