<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 500px; width: 100%;">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="bg-success bg-gradient text-white d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px;">
            <i class="bi bi-person-plus fs-2"></i>
          </div>
          <h3 class="fw-bold">Crear Cuenta</h3>
          <p class="text-muted small">Completa tus datos para registrarte</p>
        </div>
        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold small">Nombre</label>
              <input type="text" class="form-control" placeholder="Tu nombre">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold small">Apellido</label>
              <input type="text" class="form-control" placeholder="Tu apellido">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Correo electrónico</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" placeholder="correo@ejemplo.com">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Teléfono</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-telephone"></i></span>
              <input type="tel" class="form-control" placeholder="+56 9 1234 5678">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" placeholder="Mínimo 8 caracteres">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold small">Confirmar contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" placeholder="Repite la contraseña">
            </div>
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="terms">
            <label class="form-check-label small" for="terms">Acepto los <a href="#" class="text-decoration-none">términos y condiciones</a></label>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2 fw-semibold rounded-3">
            <i class="bi bi-person-check me-2"></i>Crear Cuenta
          </button>
        </form>
        <div class="text-center mt-4">
          <p class="small text-muted">¿Ya tienes cuenta? <a href="index.html" class="text-decoration-none fw-semibold">Inicia sesión</a></p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
